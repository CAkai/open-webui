version: '3.8'

services:
  # ollama:
  #   volumes:
  #     - ollama:/root/.ollama
  #   container_name: ollama
  #   pull_policy: always
  #   tty: true
  #   restart: unless-stopped
  #   image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  open-webui-doc:
    build: ./web-docs
    command: yarn serve
    ports:
      - 9988:3000

  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: 'http://10.13.186.242:11434; http://10.13.186.242:11434'
        USE_CUDA: true
        USE_OLLAMA: false
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    command: bash start.sh
    volumes:
      - open-webui:/app/backend/data
    # depends_on:
    #   - ollama
    ports:
      - 8080:8080
    environment:
      - 'OLLAMA_BASE_URL=http://10.13.186.242:11434; http://10.13.186.242:11434'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME= U-LLaMA'
    # Allow access to host network
    # extra_hosts:
    #   - host.docker.internal:host-gateway
    restart: unless-stopped
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${OLLAMA_GPU_DRIVER-nvidia}
              count: all
              capabilities:
                - gpu

volumes:
  # ollama: {}
  open-webui: {}
