services:
  ollama:
    image: ollama/ollama:0.1.48
    ports:
      - "11434:11434"
    restart: always
    volumes:
      - .:/code
      - ollama_data:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=10
      - OLLAMA_MAX_LOADED_MODELS=10

    healthcheck:
      test: ollama --version || exit 1
      interval: 600s
    networks:
      ollama_net:
        ipv4_address: 172.29.0.10

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    init: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 9999:8080
    networks:
      ollama_net:
        ipv4_address: 172.29.0.99

  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: 'http://10.13.186.242:11434'
        USE_CUDA: true
        USE_OLLAMA: false
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    command: bash start.sh
    volumes:
      - open-webui:/app/backend/data
    # depends_on:
    #   - ollama
    ports:
      - 8080:8080
    environment:
      - 'OLLAMA_BASE_URL=http://10.13.186.242:11434'
      - 'AUTOMATIC1111_BASE_URL= http://10.13.186.242:8181'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME= U-Ai'
      - 'UMC_BASE_URL=http://172.16.128.9:3003'
      - 'HF_ENDPOINT=https://hf-mirror.com'
    # Allow access to host network
    # extra_hosts:
    #   - host.docker.internal:host-gateway
    restart: unless-stopped
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${OLLAMA_GPU_DRIVER-nvidia}
              count: all
              capabilities:
                - gpu

volumes:
  # ollama: {}
  open-webui: {}
  ollama_data:

networks:
  ollama_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16