version: '3.8'

services:
  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: '/ollama'
        USE_CUDA: true
        USE_OLLAMA: false
      dockerfile: Dockerfile.dev
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    init: true
    container_name: webui
    volumes:
      - open-webui:/app/backend/data
      - ./src:/app/src
      - ./backend:/app/backend
      - ./static:/app/static
    ports:
      - 9988:8080
    environment:
      - 'OLLAMA_BASE_URL=http://host.docker.internal:11434'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME=U-AI'
      - 'UMC_BASE_URL=http://host.docker.internal:3003'
      - OPENAI_API_BASE_URL='http://host.docker.internal:9099'
      - OPENAI_API_KEY="0p3n-w3bu!"
    # Allow access to host network
    # extra_hosts:
    #   - host.docker.internal:host-gateway
    restart: unless-stopped
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${OLLAMA_GPU_DRIVER-nvidia}
              count: all
              capabilities:
                - gpu
  
  pipelines:
    container_name: pipelines
    image: ghcr.io/open-webui/pipelines:main
    restart: always
    ports:
      - 9099:9099
    volumes:
      - pipelines:/app/pipelines
    environment:
      - PIPELINES_URLS="https://github.com/open-webui/pipelines/blob/main/examples/filters/detoxify_filter_pipeline.py"

  whisper:
    container_name: whisper
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${OLLAMA_GPU_DRIVER-nvidia}
              count: all
              capabilities:
                - gpu
    environment:
      - ASR_MOEDLE=base
    ports: 
      - 9000:9000

volumes:
  open-webui: {}
  pipelines:

