server {
    listen 80;
    server_name oi.umc.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name oi.umc.com;

    ssl_certificate /etc/nginx/ssl/oi.umc.com.crt;
    ssl_certificate_key /etc/nginx/ssl/oi.umc.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ~* ^/(auth|api|oauth|admin|signin|signup|signout|login|logout|sso)/ {
        proxy_pass http://open-webui:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 20M;
        proxy_read_timeout 10m;

        # Disable caching for auth endpoints
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Profile and model images - cached for performance
    location ~ ^/api/v1/(users/[^/]+/profile/image|models/model/profile/image)$ {
        proxy_pass http://open-webui:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache images for 1 day
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~* \.(css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://open-webui:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://open-webui:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;

        client_max_body_size 20M;
        proxy_read_timeout 10m;

        add_header Cache-Control "public, max-age=300, must-revalidate";
    }
}